<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Icon Preview</title>
  <style>
    body { 
      font-family: system-ui, sans-serif; 
      background: #1a1a2e; 
      color: white; 
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }
    .row {
      display: flex;
      gap: 30px;
      align-items: center;
    }
    .icon-box {
      background: #16213e;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .icon-box img {
      border-radius: 12px;
    }
    .label {
      font-size: 12px;
      color: #888;
    }
    h2 { margin: 0 0 10px 0; color: #818cf8; }
  </style>
</head>
<body>
  <div>
    <h2>app-icon.svg (推荐)</h2>
    <p style="color:#aaa;font-size:14px;">循环箭头 + 钱币符号 = 周期性付款/订阅</p>
    <div class="row">
      <div class="icon-box">
        <img src="app-icon.svg" width="128" height="128">
        <span class="label">128px</span>
      </div>
      <div class="icon-box">
        <img src="app-icon.svg" width="64" height="64">
        <span class="label">64px</span>
      </div>
      <div class="icon-box">
        <img src="app-icon.svg" width="32" height="32">
        <span class="label">32px</span>
      </div>
      <div class="icon-box">
        <img src="app-icon.svg" width="16" height="16">
        <span class="label">16px</span>
      </div>
    </div>
  </div>

  <div>
    <h2>logo.svg (简约)</h2>
    <p style="color:#aaa;font-size:14px;">简洁的循环 + $ 符号</p>
    <div class="row">
      <div class="icon-box">
        <img src="logo.svg" width="128" height="128">
        <span class="label">128px</span>
      </div>
      <div class="icon-box">
        <img src="logo.svg" width="64" height="64">
        <span class="label">64px</span>
      </div>
      <div class="icon-box">
        <img src="logo.svg" width="32" height="32">
        <span class="label">32px</span>
      </div>
    </div>
  </div>

  <div>
    <h2>icon.svg (详细)</h2>
    <p style="color:#aaa;font-size:14px;">账单卡片 + 日历 + 循环</p>
    <div class="row">
      <div class="icon-box">
        <img src="icon.svg" width="128" height="128">
        <span class="label">128px</span>
      </div>
      <div class="icon-box">
        <img src="icon.svg" width="64" height="64">
        <span class="label">64px</span>
      </div>
    </div>
  </div>
</body>
</html>
