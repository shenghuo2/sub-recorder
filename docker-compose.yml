services:
  sub-recorder:
    build: .
    container_name: sub-recorder
    restart: unless-stopped
    ports:
      - "3010:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_PATH=/app/data/subscriptions.db
      # - DISABLE_AUTH=true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/auth/check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
