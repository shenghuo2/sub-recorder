name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v3.2.2)'
        required: true
        type: string
      push_latest:
        description: '同时推送 latest 标签'
        required: false
        type: boolean
        default: true
      create_release:
        description: '创建 GitHub Release'
        required: false
        type: boolean
        default: true

env:
  DOCKERHUB_USERNAME: shenghuo2
  IMAGE_NAME: sub-recorder

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ 版本号格式错误，应为 vX.Y.Z (例如: v3.2.2)"
            exit 1
          fi
          echo "✅ 版本号格式正确: ${{ inputs.version }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest,enable=${{ inputs.push_latest }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Git tag
        if: inputs.create_release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Generate release notes
        if: inputs.create_release
        id: notes
        run: |
          # 获取上一个 tag
          PREV_TAG=$(git tag --sort=-creatordate | grep -E '^v[0-9]' | head -2 | tail -1)
          CURRENT_TAG="${{ inputs.version }}"

          echo "Previous tag: $PREV_TAG"
          echo "Current tag: $CURRENT_TAG"

          # 生成 changelog
          {
            echo "body<<RELEASE_EOF"

            echo "## Docker 镜像"
            echo ""
            echo '```bash'
            echo "docker pull ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${CURRENT_TAG}"
            echo '```'
            echo ""
            echo "| 标签 | 链接 |"
            echo "|------|------|"
            echo "| \`${CURRENT_TAG}\` | [Docker Hub](https://hub.docker.com/r/${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}/tags?name=${CURRENT_TAG}) |"
            if [ "${{ inputs.push_latest }}" = "true" ]; then
              echo "| \`latest\` | [Docker Hub](https://hub.docker.com/r/${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}/tags?name=latest) |"
            fi
            echo ""

            echo "## 更新内容"
            echo ""
            if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CURRENT_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges
            else
              git log --pretty=format:"- %s (%h)" --no-merges -20
            fi
            echo ""
            echo ""

            if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CURRENT_TAG" ]; then
              echo "**完整变更**: [\`${PREV_TAG}...${CURRENT_TAG}\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG})"
            fi

            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
