name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v3.2.2)'
        required: true
        type: string
      push_latest:
        description: '同时推送 latest 标签'
        required: false
        type: boolean
        default: true
      create_release:
        description: '创建 GitHub Release'
        required: false
        type: boolean
        default: true

env:
  DOCKERHUB_USERNAME: shenghuo2
  IMAGE_NAME: sub-recorder
  REGISTRY_IMAGE: shenghuo2/sub-recorder

jobs:
  # ==================== 版本校验 ====================
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ 版本号格式错误，应为 vX.Y.Z (例如: v3.2.2)"
            exit 1
          fi

  # ==================== 二进制构建 ====================
  build-binaries:
    needs: [validate]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: sub-recorder-linux-amd64
            binary: sub-recorder
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            artifact: sub-recorder-linux-arm64
            binary: sub-recorder
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: sub-recorder-windows-x64
            binary: sub-recorder.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: sub-recorder-windows-arm64
            binary: sub-recorder.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          key: ${{ matrix.target }}

      - name: Install musl-tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build binary
        working-directory: backend
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux)
        if: runner.os == 'Linux'
        run: strip backend/target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp backend/target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cd dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a ../${{ matrix.artifact }}.zip ${{ matrix.binary }}
          else
            tar czf ../${{ matrix.artifact }}.tar.gz ${{ matrix.binary }}
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ runner.os == 'Windows' && format('{0}.zip', matrix.artifact) || format('{0}.tar.gz', matrix.artifact) }}
          retention-days: 1

      # 额外上传裸二进制供 Docker 构建使用（仅 Linux）
      - name: Upload raw binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact }}
          path: backend/target/${{ matrix.target }}/release/${{ matrix.binary }}
          retention-days: 1

  # ==================== Docker 镜像构建 ====================
  docker-amd64:
    runs-on: ubuntu-latest
    needs: [build-binaries]
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: binary-sub-recorder-linux-amd64
          path: /tmp/binary

      - name: Prepare binary
        run: |
          mkdir -p docker/bin
          cp /tmp/binary/sub-recorder docker/bin/sub-recorder
          chmod +x docker/bin/sub-recorder

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ci
          build-args: BINARY=docker/bin/sub-recorder
          platforms: linux/amd64
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-amd64
          cache-to: type=gha,scope=docker-amd64,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-arm64:
    runs-on: ubuntu-24.04-arm
    needs: [build-binaries]
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: binary-sub-recorder-linux-arm64
          path: /tmp/binary

      - name: Prepare binary
        run: |
          mkdir -p docker/bin
          cp /tmp/binary/sub-recorder docker/bin/sub-recorder
          chmod +x docker/bin/sub-recorder

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ci
          build-args: BINARY=docker/bin/sub-recorder
          platforms: linux/arm64
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-arm64
          cache-to: type=gha,scope=docker-arm64,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-arm64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ==================== 合并镜像 & 发布 ====================
  merge-and-release:
    runs-on: ubuntu-latest
    needs: [docker-amd64, docker-arm64, build-binaries]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          TAGS="-t ${{ env.REGISTRY_IMAGE }}:${{ inputs.version }}"
          if [ "${{ inputs.push_latest }}" = "true" ]; then
            TAGS="$TAGS -t ${{ env.REGISTRY_IMAGE }}:latest"
          fi
          docker buildx imagetools create $TAGS \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ inputs.version }}

      - name: Create Git tag
        if: inputs.create_release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Generate release notes
        if: inputs.create_release
        id: notes
        run: |
          CURRENT_TAG="${{ inputs.version }}"
          # 排除当前 tag，取上一个版本 tag
          PREV_TAG=$(git tag --sort=-creatordate | grep -E '^v[0-9]' | grep -v "^${CURRENT_TAG}$" | head -1)

          echo "Previous tag: $PREV_TAG"
          echo "Current tag: $CURRENT_TAG"

          {
            echo "body<<RELEASE_EOF"

            echo "> $(date +%Y-%m-%d) · ${CURRENT_TAG}"
            echo ""
            echo "## Docker 镜像"
            echo ""
            echo "支持 \`linux/amd64\` 和 \`linux/arm64\` 架构。"
            echo ""
            echo '```bash'
            echo "docker pull ${{ env.REGISTRY_IMAGE }}:${CURRENT_TAG}"
            echo '```'
            echo ""
            echo "| 标签 | 链接 |"
            echo "|------|------|"
            echo "| \`${CURRENT_TAG}\` | [Docker Hub](https://hub.docker.com/r/${{ env.REGISTRY_IMAGE }}/tags?name=${CURRENT_TAG}) |"
            echo ""
            echo "## 独立二进制"
            echo ""
            echo "无需 Docker，直接运行。需自行准备前端静态文件（\`npm run build\` 后的 \`out/\` 目录）。"
            echo ""
            echo "| 平台 | 文件 |"
            echo "|------|------|"
            echo "| Linux x86_64 | \`sub-recorder-linux-amd64.tar.gz\` |"
            echo "| Linux ARM64 | \`sub-recorder-linux-arm64.tar.gz\` |"
            echo "| Windows x64 | \`sub-recorder-windows-x64.zip\` |"
            echo "| Windows ARM64 | \`sub-recorder-windows-arm64.zip\` |"
            echo ""

            echo "## 更新内容"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges
            else
              git log --pretty=format:"- %s (%h)" --no-merges -20
            fi
            echo ""
            echo ""

            if [ -n "$PREV_TAG" ]; then
              echo "**完整变更**: [\`${PREV_TAG}...${CURRENT_TAG}\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG})"
            fi

            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download binary artifacts
        if: inputs.create_release
        uses: actions/download-artifact@v4
        with:
          path: /tmp/binaries
          pattern: sub-recorder-*
          merge-multiple: true

      - name: Create GitHub Release
        if: inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: 'Version: ${{ inputs.version }}'
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
          files: |
            /tmp/binaries/sub-recorder-linux-amd64.tar.gz
            /tmp/binaries/sub-recorder-linux-arm64.tar.gz
            /tmp/binaries/sub-recorder-windows-x64.zip
            /tmp/binaries/sub-recorder-windows-arm64.zip
